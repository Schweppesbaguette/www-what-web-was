<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1000px; height: 780px;
  background: transparent !important;
  overflow: hidden;
  -webkit-app-region: drag; /* whole window draggable by default */
  user-select: none;
}
#skin {
  position: absolute;
  top: 0; left: 0;
  width: 1000px; height: 780px;
  pointer-events: none;
  /* The PNG alpha channel creates the non-rectangular shape */
}
/* Inputs/buttons not draggable */
input, button, label, .nodrag {
  -webkit-app-region: no-drag;
  user-select: text;
}

/* ── Field styling ── */
.field {
  position: absolute;
  padding: 7px 12px;
  background: rgba(2, 10, 52, 0.90);
  border: 1px solid rgba(70, 120, 230, 0.55);
  border-radius: 5px;
  color: white;
  font-size: 13px;
  font-family: Tahoma, Arial, sans-serif;
  box-shadow: inset 0 2px 6px rgba(0,0,60,0.8);
  outline: none;
  -webkit-app-region: no-drag;
}
.field:focus { border-color: #92d9ff; box-shadow: inset 0 2px 6px rgba(0,0,60,0.8), 0 0 6px rgba(146,217,255,0.3); }

/* ── Mascot picks ── */
.mascot-cell {
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 8px;
  padding: 4px;
  transition: all 0.12s;
  -webkit-app-region: no-drag;
}
.mascot-cell:hover { border-color: rgba(72,136,255,0.6); background: rgba(0,20,80,0.25); }
.mascot-cell.sel { border-color: #81ff28; background: rgba(0,50,0,0.2); box-shadow: 0 0 10px rgba(129,255,40,0.4); }
.mascot-cell img { width: 80px; height: 96px; object-fit: contain; pointer-events: none; }

/* ── Buttons ── */
.btn {
  cursor: pointer; border-radius: 8px;
  font-size: 13px; font-weight: bold; font-family: Tahoma, Arial, sans-serif;
  color: white; border: 2px solid;
  -webkit-app-region: no-drag;
  transition: filter 0.1s;
}
.btn:hover { filter: brightness(1.15); }
.btn-switch {
  background: linear-gradient(180deg, #1e3f78, #0c1e4a);
  border-color: rgba(100,150,255,0.6);
  box-shadow: 0 2px 8px rgba(0,20,80,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-sign {
  background: linear-gradient(180deg, #3a78e8, #1438c0);
  border-color: rgba(146,217,255,0.6);
  box-shadow: 0 2px 10px rgba(72,120,255,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
}

#signon-status {
  position: absolute;
  color: #81ff28; font-size: 10px; font-family: Tahoma; font-weight: bold;
  text-shadow: 0 0 6px rgba(129,255,40,0.6);
  text-align: center;
  -webkit-app-region: no-drag;
}
</style>
</head>
<body>

<!-- The skin PNG — alpha channel shapes the window -->
<img id="skin" src="assets/login2.png"/>

<!-- Screen Name (over the skin's Screen Name field area) -->
<input id="s-name" class="field" readonly
  style="top:45%;left:18%;width:37%;"
/>

<!-- Password -->
<input id="s-pass" class="field" type="password"
  style="top:54%;left:18%;width:37%;"
  onkeydown="if(event.key==='Enter')doSignOn()"
/>

<!-- Remember + Forgot -->
<div class="nodrag" style="position:absolute;top:62.5%;left:15%;width:40%;display:flex;align-items:center;gap:8px;">
  <input type="checkbox" id="s-remember" checked style="accent-color:#4888e8;width:15px;height:15px;-webkit-app-region:no-drag;"/>
  <label for="s-remember" style="color:#92d9ff;font-size:11px;font-family:Tahoma;cursor:pointer;">Remember my password</label>
  <span style="color:#4888e8;font-size:10px;font-family:Tahoma;margin-left:auto;cursor:pointer;" onclick="">Forgot Password?</span>
</div>

<!-- Status -->
<div id="signon-status" style="top:68%;left:16%;width:38%;"></div>

<!-- Switch User button -->
<button class="btn btn-switch" style="position:absolute;top:72%;left:13%;width:18%;padding:8px 4px;" onclick="switchUser()">Switch User</button>

<!-- Sign On button -->
<button class="btn btn-sign" style="position:absolute;top:72%;left:33%;width:22%;padding:8px 4px;" onclick="doSignOn()">▶ Sign On</button>

<!-- Mascot grid (3x2 over right panel) -->
<div id="mascot-grid" style="
  position:absolute;top:35%;left:54%;width:38%;height:42%;
  display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;
  gap:3%;align-items:center;justify-items:center;
  -webkit-app-region:no-drag;
"></div>

<!-- Oscilloscope (bottom-right circle) -->
<canvas id="osc" style="position:absolute;top:80%;left:80%;width:13%;height:11%;"></canvas>

<script>
// ── Config ──
let myMascot = 'PUNK';
let CFG = {};

// Load saved config
try { const s = localStorage.getItem('www_cfg'); if(s) CFG = JSON.parse(s); } catch(e) {}
myMascot = CFG.mascot || 'PUNK';

// If no config, redirect to setup in main window
if(!CFG.screenName || !CFG.ablyKey) {
  if(window.electronAPI) {
    window.electronAPI.signonComplete(); // open main window which shows setup
  } else {
    window.location.href = 'index.html';
  }
}

// Mascot data (mirrored from main app)
const MASCOTS = {
  PUNK: { name:'W.W. Punk', color:'#FF0066', accent:'#FF66BB' },
  HH:   { name:'W.W. Hip Hop', color:'#4040FF', accent:'#FFD700' },
  HIPPIE:{ name:'W.W. Hippie', color:'#00AA00', accent:'#88DD44' },
  RASTA: { name:'W.W. Rasta', color:'#CC4400', accent:'#FFCC00' },
  TECHNO:{ name:'W.W. Techno', color:'#0088AA', accent:'#00FFFF' },
  NERD:  { name:'W.W. Nerd Girl', color:'#D97706', accent:'#FDE68A' },
};
const MKEYS = ['PUNK','HH','HIPPIE','RASTA','TECHNO','NERD'];

// Assets — same base64 sprites as main app (loaded from localStorage cache or inline)
// Load assets directly from files
const ASSET_PATHS = {
  PUNK: 'assets/mascot-punk.png',
  HH: 'assets/mascot-hh.png',
  HIPPIE: 'assets/mascot-hippie.png',
  RASTA: 'assets/mascot-rasta.png',
  TECHNO: 'assets/mascot-techno.png',
  NERD: 'assets/mascot-nerd.png',
};

// ── Populate fields ──
document.getElementById('s-name').value = CFG.screenName || '';
try { const p = localStorage.getItem('www_pass'); if(p) document.getElementById('s-pass').value = atob(p); } catch(e){}

// ── Build mascot grid ──
function buildGrid() {
  const grid = document.getElementById('mascot-grid');
  grid.innerHTML = '';
  MKEYS.forEach(key => {
    const cell = document.createElement('div');
    cell.className = 'mascot-cell' + (key === myMascot ? ' sel' : '');
    cell.dataset.key = key;
    const img = document.createElement('img');
    img.src = ASSET_PATHS[key] || '';
    img.alt = key;
    cell.appendChild(img);
    cell.onclick = () => {
      myMascot = key;
      document.querySelectorAll('.mascot-cell').forEach(c => c.classList.remove('sel'));
      cell.classList.add('sel');
    };
    grid.appendChild(cell);
  });
}
buildGrid();

// ── Oscilloscope ──
(function() {
  const canvas = document.getElementById('osc');
  canvas.width = 130; canvas.height = 65;
  const ctx = canvas.getContext('2d');
  let phase = 0;
  function draw() {
    const acc = (MASCOTS[myMascot] && MASCOTS[myMascot].accent) || '#00ccff';
    ctx.clearRect(0,0,130,65);
    // Bg
    ctx.fillStyle = 'rgba(0,10,40,0.7)';
    ctx.fillRect(0,0,130,65);
    // Grid
    ctx.strokeStyle = 'rgba(0,80,160,0.4)'; ctx.lineWidth = 0.5;
    for(let y=10;y<65;y+=13){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(130,y);ctx.stroke();}
    // Wave 1
    ctx.strokeStyle = acc; ctx.lineWidth = 2;
    ctx.shadowColor = acc; ctx.shadowBlur = 6;
    ctx.beginPath();
    for(let x=0;x<130;x++){
      const y = 32 + Math.sin((x/130)*Math.PI*5+phase)*13 + Math.sin((x/130)*Math.PI*10+phase*1.5)*5;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    phase += 0.07;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Sign On ──
function doSignOn() {
  const pass = document.getElementById('s-pass').value;
  const status = document.getElementById('signon-status');
  if(CFG.password && pass !== CFG.password) {
    status.textContent = 'Incorrect password.';
    status.style.color = '#ff6060';
    return;
  }
  if(document.getElementById('s-remember').checked) {
    try { localStorage.setItem('www_pass', btoa(CFG.password||'')); } catch(e){}
  }
  CFG.mascot = myMascot;
  try { localStorage.setItem('www_cfg', JSON.stringify(CFG)); } catch(e){}
  status.textContent = 'Connecting...';
  status.style.color = '#81ff28';
  // Tell main process to open the main window
  if(window.electronAPI) {
    window.electronAPI.signonComplete(CFG);
  } else {
    // Browser fallback — reload into main app
    window.location.href = 'index.html';
  }
}

function switchUser() {
  try { localStorage.removeItem('www_cfg'); localStorage.removeItem('www_pass'); } catch(e){}
  window.location.reload();
}
</script>
</body>
</html>
