<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1236px; height: 980px;
  background: #1a1a2e;
  overflow: hidden;
  -webkit-app-region: drag;
  user-select: none;
}
#skin {
  position: absolute; top: 0; left: 0;
  width: 1236px; height: 980px;
  pointer-events: none; z-index: 1;
}
input, button, label, canvas, .nodrag {
  -webkit-app-region: no-drag;
  user-select: text;
  position: absolute;
  z-index: 2;
}
.field {
  padding: 8px 14px;
  background: rgba(2, 10, 52, 0.75);
  border: 1px solid rgba(70, 120, 230, 0.4);
  border-radius: 5px;
  color: white;
  font-size: 14px;
  font-family: Tahoma, Arial, sans-serif;
  outline: none;
  width: 36%;
}
.field:focus { border-color: #92d9ff; background: rgba(2,10,72,0.85); }
.btn {
  cursor: pointer; border-radius: 20px;
  font-size: 13px; font-weight: bold;
  font-family: Tahoma, Arial, sans-serif;
  color: white; border: 2px solid;
  transition: filter 0.1s;
  -webkit-app-region: no-drag;
}
.btn:hover { filter: brightness(1.2); }
.mascot-cell {
  position: absolute;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  z-index: 2;
  -webkit-app-region: no-drag;
  transition: box-shadow 0.12s;
}
.mascot-cell:hover { box-shadow: 0 0 12px rgba(129,255,40,0.5); }
.mascot-cell.sel { box-shadow: 0 0 16px rgba(129,255,40,0.8), inset 0 0 0 2px #81ff28; }
.mascot-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
</style>
</head>
<body>

<img id="skin" src="assets/login_empty.png"/>

<!-- Screen Name -->
<input id="s-name" class="field" type="text" placeholder="Screen Name"
  style="top:42%; left:8%;" value="YourScreenName"/>

<!-- Password -->
<input id="s-pass" class="field" type="password" placeholder="Password"
  style="top:52%; left:8%;"/>

<!-- Remember row -->
<div class="nodrag" style="top:61.5%; left:8%; width:36%; display:flex; align-items:center; gap:8px; font-family:Tahoma;">
  <input type="checkbox" checked style="accent-color:#4888e8; width:14px; height:14px; -webkit-app-region:no-drag; flex-shrink:0;"/>
  <label style="color:#92d9ff; font-size:11px; cursor:pointer;">Remember my password</label>
  <span style="color:#4888e8; font-size:10px; margin-left:auto; cursor:pointer;">Forgot?</span>
</div>

<!-- Status -->
<div id="status" style="top:67.5%; left:8%; width:36%; color:#81ff28; font-size:11px; font-family:Tahoma; font-weight:bold; text-align:center;"></div>

<!-- Switch User -->
<button class="btn" onclick="switchUser()"
  style="top:72%; left:8%; width:16%; padding:8px 4px;
  background:linear-gradient(180deg,#1e3f78,#0c1e4a);
  border-color:rgba(100,150,255,0.6);">Switch User</button>

<!-- Sign On -->
<button class="btn" onclick="doSignOn()"
  style="top:72%; left:26%; width:18%; padding:8px 4px;
  background:linear-gradient(180deg,#3a78e8,#1438c0);
  border-color:rgba(146,217,255,0.6);">▶ Sign On</button>

<!-- Mascot cells — positioned over the 6 pre-drawn slots in the skin -->
<!-- Row 1 -->
<div class="mascot-cell sel" data-key="PUNK"   style="top:38.5%; left:52.2%; width:11.8%; height:17.5%;" onclick="selectMascot(this)"><img id="img-PUNK"   alt="PUNK"/></div>
<div class="mascot-cell"     data-key="HH"     style="top:38.5%; left:65.5%; width:11.8%; height:17.5%;" onclick="selectMascot(this)"><img id="img-HH"     alt="HH"/></div>
<div class="mascot-cell"     data-key="HIPPIE" style="top:38.5%; left:78.8%; width:11.8%; height:17.5%;" onclick="selectMascot(this)"><img id="img-HIPPIE" alt="HIPPIE"/></div>
<!-- Row 2 -->
<div class="mascot-cell"     data-key="RASTA"  style="top:57.5%; left:52.2%; width:11.8%; height:17.5%;" onclick="selectMascot(this)"><img id="img-RASTA"  alt="RASTA"/></div>
<div class="mascot-cell"     data-key="TECHNO" style="top:57.5%; left:65.5%; width:11.8%; height:17.5%;" onclick="selectMascot(this)"><img id="img-TECHNO" alt="TECHNO"/></div>
<div class="mascot-cell"     data-key="NERD"   style="top:57.5%; left:78.8%; width:11.8%; height:17.5%;" onclick="selectMascot(this)"><img id="img-NERD"   alt="NERD"/></div>

<!-- Oscilloscope — over the teal grid circle bottom right -->
<canvas id="osc" style="top:82%; left:87.5%; width:9.5%; height:10.5%; z-index:2; border-radius:50%; -webkit-app-region:no-drag;"></canvas>

<script>
let myMascot = 'PUNK';
let CFG = {};
try { const s = localStorage.getItem('www_cfg'); if(s) CFG = JSON.parse(s); } catch(e){}
myMascot = CFG.mascot || 'PUNK';

// Mascot images — load from assets/ (browser) or readAssetBase64 (Electron)
const MASCOT_FILES = {
  PUNK:'mascot-punk.png', HH:'mascot-hh.png', HIPPIE:'mascot-hippie.png',
  RASTA:'mascot-rasta.png', TECHNO:'mascot-techno.png', NERD:'mascot-nerd.png'
};

async function loadAssets() {
  for (const [key, file] of Object.entries(MASCOT_FILES)) {
    const img = document.getElementById('img-'+key);
    if (!img) continue;
    if (window.electronAPI && window.electronAPI.readAssetBase64) {
      const data = await window.electronAPI.readAssetBase64(file);
      if (data) img.src = data;
    } else {
      img.src = 'assets/' + file;
    }
  }
  // Skin
  if (window.electronAPI && window.electronAPI.readAssetBase64) {
    const d = await window.electronAPI.readAssetBase64('login_empty.png');
    if (d) document.getElementById('skin').src = d;
  }
}
loadAssets();

// Set initial selection
document.querySelectorAll('.mascot-cell').forEach(c => {
  c.classList.toggle('sel', c.dataset.key === myMascot);
});

function selectMascot(cell) {
  myMascot = cell.dataset.key;
  document.querySelectorAll('.mascot-cell').forEach(c => c.classList.remove('sel'));
  cell.classList.add('sel');
}

function doSignOn() {
  const status = document.getElementById('status');
  const pass = document.getElementById('s-pass').value;
  if (CFG.password && pass !== CFG.password) {
    status.textContent = 'Incorrect password.';
    status.style.color = '#ff6060';
    return;
  }
  CFG.mascot = myMascot;
  try { localStorage.setItem('www_cfg', JSON.stringify(CFG)); } catch(e){}
  status.textContent = 'Connecting...';
  status.style.color = '#81ff28';
  // Play dialup then sign on
  try {
    const snd = document.getElementById('dialup-snd');
    if (snd) { snd.currentTime = 0; snd.play().catch(()=>{}); }
  } catch(e){}
  // Wait for dialup sound to finish (6s), then sign on
  const snd2 = document.getElementById('dialup-snd');
  const waitMs = snd2 && snd2.duration ? (snd2.duration * 1000) : 6000;
  setTimeout(() => {
    if (window.electronAPI) window.electronAPI.signonComplete();
    else window.location.href = 'index.html';
  }, waitMs);
}

function switchUser() {
  try { localStorage.removeItem('www_cfg'); localStorage.removeItem('www_pass'); } catch(e){}
  window.location.reload();
}

// Oscilloscope
(function() {
  const canvas = document.getElementById('osc');
  function resize() { canvas.width = canvas.offsetWidth || 120; canvas.height = canvas.offsetHeight || 105; }
  resize();
  const ctx = canvas.getContext('2d');
  let phase = 0;
  function draw() {
    const cw = canvas.width, ch = canvas.height;
    ctx.clearRect(0,0,cw,ch);
    ctx.fillStyle = 'rgba(0,8,30,0.75)';
    ctx.fillRect(0,0,cw,ch);
    ctx.strokeStyle = 'rgba(0,80,160,0.3)'; ctx.lineWidth = 0.5;
    for(let y=ch/5;y<ch;y+=ch/5){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cw,y);ctx.stroke();}
    ctx.strokeStyle = '#81ff28'; ctx.lineWidth = 1.5;
    ctx.shadowColor = '#81ff28'; ctx.shadowBlur = 6;
    ctx.beginPath();
    for(let x=0;x<cw;x++){
      const y = ch/2 + Math.sin((x/cw)*Math.PI*5+phase)*ch*0.2 + Math.sin((x/cw)*Math.PI*9+phase*1.3)*ch*0.08;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.shadowBlur=0;
    phase += 0.07;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
<audio id="dialup-snd" src="assets/dialup.mp3" preload="auto"></audio>
</body>
</html>
