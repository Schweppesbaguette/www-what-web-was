<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: transparent !important;
  overflow: hidden;
  user-select: none;
}
/* Fixed stage at native PNG size, scaled to fit window */
#stage {
  position: absolute;
  width: 1236px; height: 980px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  transform-origin: center center;
  -webkit-app-region: drag;
}
#skin {
  position: absolute; top: 0; left: 0;
  width: 1236px; height: 980px;
  pointer-events: none; z-index: 1;
  display: block;
}
input, button, label, canvas, .nodrag {
  -webkit-app-region: no-drag;
  user-select: text;
  position: absolute;
  z-index: 2;
}
.field {
  padding: 10px 14px;
  background: rgba(2, 10, 52, 0.75);
  border: 1px solid rgba(70, 120, 230, 0.4);
  border-radius: 5px;
  color: white;
  font-size: 16px;
  font-family: Tahoma, Arial, sans-serif;
  outline: none;
}
.field:focus { border-color: #92d9ff; background: rgba(2,10,72,0.85); }
.btn {
  cursor: pointer; border-radius: 25px;
  font-size: 14px; font-weight: bold;
  font-family: Tahoma, Arial, sans-serif;
  color: white; border: 2px solid;
  transition: filter 0.1s;
  -webkit-app-region: no-drag;
}
.btn:hover { filter: brightness(1.2); }
.mascot-cell {
  position: absolute;
  cursor: pointer;
  border-radius: 8px;
  z-index: 2;
  -webkit-app-region: no-drag;
  transition: box-shadow 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.mascot-cell:hover { box-shadow: 0 0 10px rgba(129,255,40,0.5); }
.mascot-cell.sel {
  box-shadow: 0 0 14px rgba(129,255,40,1), inset 0 0 0 3px #81ff28;
}
.mascot-cell img {
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center bottom;
  display: block;
}
/* Oscilloscope clipped circle */
#osc-wrap {
  position: absolute;
  top: 780px; left: 1040px;
  width: 140px; height: 145px;
  border-radius: 50%;
  overflow: hidden;
  z-index: 2;
  pointer-events: none;
}
#osc {
  width: 100%; height: 100%;
  position: relative;
  top: auto; left: auto;
  display: block;
}
</style>
</head>
<body>
<div id="stage">
<img id="skin" src=""/>

<!-- Screen Name input — left panel, top -->
<input id="s-name" class="field" type="text" placeholder="Screen Name"
  style="top:445px; left:175px; width:430px;"/>

<!-- Password -->
<input id="s-pass" class="field" type="password" placeholder="Password"
  style="top:520px; left:175px; width:430px;"
  onkeydown="if(event.key==='Enter')doSignOn()"/>

<!-- Remember row -->
<div class="nodrag" style="top:595px; left:175px; width:430px; display:flex; align-items:center; gap:8px; font-family:Tahoma;">
  <input type="checkbox" id="s-remember" checked
    style="accent-color:#4888e8; width:16px; height:16px; -webkit-app-region:no-drag; flex-shrink:0; position:static;"/>
  <label for="s-remember"
    style="color:#92d9ff; font-size:13px; cursor:pointer; position:static;">Remember my password</label>
  <span style="color:#4888e8; font-size:12px; margin-left:auto; cursor:pointer;">Forgot?</span>
</div>

<!-- Status -->
<div id="status" style="top:645px; left:175px; width:430px;
  color:#81ff28; font-size:12px; font-family:Tahoma; font-weight:bold; text-align:center;"></div>

<!-- Switch User -->
<button class="btn" onclick="switchUser()"
  style="top:695px; left:175px; width:175px; padding:11px 4px;
  background:linear-gradient(180deg,#1e3f78,#0c1e4a);
  border-color:rgba(100,150,255,0.6);">Switch User</button>

<!-- Sign On -->
<button class="btn" onclick="doSignOn()"
  style="top:695px; left:370px; width:235px; padding:11px 4px;
  background:linear-gradient(180deg,#3a78e8,#1438c0);
  border-color:rgba(146,217,255,0.6);">▶ Sign On</button>

<!-- Mascot cells — PIXEL-MEASURED from login_empty.png -->
<!-- Row 1: top=401, height=126 -->
<div class="mascot-cell sel" data-key="PUNK"
  style="top:401px; left:767px; width:113px; height:126px;"
  onclick="selectMascot(this)"><img id="img-PUNK" alt="PUNK"/></div>
<div class="mascot-cell" data-key="HH"
  style="top:401px; left:896px; width:113px; height:126px;"
  onclick="selectMascot(this)"><img id="img-HH" alt="HH"/></div>
<div class="mascot-cell" data-key="HIPPIE"
  style="top:401px; left:1024px; width:112px; height:126px;"
  onclick="selectMascot(this)"><img id="img-HIPPIE" alt="HIPPIE"/></div>
<!-- Row 2: top=540, height=145 -->
<div class="mascot-cell" data-key="RASTA"
  style="top:540px; left:767px; width:113px; height:145px;"
  onclick="selectMascot(this)"><img id="img-RASTA" alt="RASTA"/></div>
<div class="mascot-cell" data-key="TECHNO"
  style="top:540px; left:896px; width:113px; height:145px;"
  onclick="selectMascot(this)"><img id="img-TECHNO" alt="TECHNO"/></div>
<div class="mascot-cell" data-key="NERD"
  style="top:540px; left:1024px; width:112px; height:145px;"
  onclick="selectMascot(this)"><img id="img-NERD" alt="NERD"/></div>

<!-- Oscilloscope clipped to chrome bezel circle -->
<div id="osc-wrap"><canvas id="osc"></canvas></div>

<audio id="dialup-snd" preload="auto"></audio>

</div><!-- /stage -->

<script>
let myMascot = 'PUNK';
let CFG = {};
try { const s = localStorage.getItem('www_cfg'); if(s) CFG = JSON.parse(s); } catch(e){}
myMascot = CFG.mascot || 'PUNK';

// If no config, go to setup
if (!CFG.screenName || !CFG.ablyKey) {
  if (window.electronAPI) window.electronAPI.signonComplete();
  else window.location.href = 'index.html';
}

async function loadAssets() {
  const files = {
    skin:    'login_empty.png',
    PUNK:    'mascot-punk.png',
    HH:      'mascot-hh.png',
    HIPPIE:  'mascot-hippie.png',
    RASTA:   'mascot-rasta.png',
    TECHNO:  'mascot-techno.png',
    NERD:    'mascot-nerd.png',
    dialup:  'dialup.mp3',
  };
  for (const [key, file] of Object.entries(files)) {
    let src;
    if (window.electronAPI && window.electronAPI.readAssetBase64) {
      src = await window.electronAPI.readAssetBase64(file);
    }
    if (!src) src = 'assets/' + file;
    if (key === 'skin') {
      document.getElementById('skin').src = src;
    } else if (key === 'dialup') {
      document.getElementById('dialup-snd').src = src;
    } else {
      const img = document.getElementById('img-' + key);
      if (img) img.src = src;
    }
  }
}
loadAssets();

document.getElementById('s-name').value = CFG.screenName || '';
try { const p = localStorage.getItem('www_pass'); if(p) document.getElementById('s-pass').value = atob(p); } catch(e){}
document.querySelectorAll('.mascot-cell').forEach(c => c.classList.toggle('sel', c.dataset.key === myMascot));

function selectMascot(cell) {
  myMascot = cell.dataset.key;
  document.querySelectorAll('.mascot-cell').forEach(c => c.classList.remove('sel'));
  cell.classList.add('sel');
}

function doSignOn() {
  const status = document.getElementById('status');
  const pass = document.getElementById('s-pass').value;
  if (CFG.password && pass !== CFG.password) {
    status.textContent = 'Incorrect password.';
    status.style.color = '#ff6060';
    return;
  }
  if (document.getElementById('s-remember').checked) {
    try { localStorage.setItem('www_pass', btoa(CFG.password || '')); } catch(e){}
  }
  CFG.mascot = myMascot;
  try { localStorage.setItem('www_cfg', JSON.stringify(CFG)); } catch(e){}
  status.textContent = 'Signing on...';
  status.style.color = '#81ff28';
  setTimeout(() => {
    if (window.electronAPI) window.electronAPI.signonComplete();
    else window.location.href = 'index.html';
  }, 300);
}

function switchUser() {
  try { localStorage.removeItem('www_cfg'); localStorage.removeItem('www_pass'); } catch(e){}
  window.location.reload();
}

// Oscilloscope animation, clipped to the round bezel
(function() {
  const canvas = document.getElementById('osc');
  function resize() {
    canvas.width = canvas.offsetWidth || 140;
    canvas.height = canvas.offsetHeight || 145;
  }
  resize();
  const ctx = canvas.getContext('2d');
  let phase = 0;
  function draw() {
    const cw = canvas.width, ch = canvas.height;
    ctx.clearRect(0,0,cw,ch);
    // Don't draw background — let chrome PNG show through
    ctx.strokeStyle = '#81ff28';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#81ff28';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for(let x=0;x<cw;x++){
      const y = ch/2 + Math.sin((x/cw)*Math.PI*4+phase)*ch*0.22 + Math.sin((x/cw)*Math.PI*8+phase*1.3)*ch*0.07;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;
    phase += 0.08;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
