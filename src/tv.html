<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:1100px; height:860px;
  background:transparent !important;
  overflow:hidden;
  -webkit-app-region:drag;
  user-select:none;
}
#skin { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none; }
input,button,select,webview,iframe,.nodrag { -webkit-app-region:no-drag; user-select:text; }

/* Nav sidebar items */
.nav-item {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; cursor:pointer;
  font-size:12px; font-family:Tahoma; color:#92d9ff;
  border-radius:4px; margin:1px 4px;
  transition:all 0.1s; -webkit-app-region:no-drag;
}
.nav-item:hover { background:rgba(72,136,255,0.25); }
.nav-item.active { background:linear-gradient(90deg,#1848c8,#0a2880); color:white; }
.nav-icon { font-size:14px; flex-shrink:0; }

/* Playlist items */
.pl-item {
  display:flex; align-items:center; gap:6px;
  padding:4px 8px; cursor:pointer;
  font-size:11px; font-family:Tahoma; color:#92d9ff;
  border-bottom:1px solid rgba(72,136,255,0.1);
  -webkit-app-region:no-drag;
}
.pl-item:hover { background:rgba(72,136,255,0.15); }
.pl-item.active { color:#81ff28; }
.pl-num { width:20px; color:#4a7aaa; flex-shrink:0; font-size:10px; }
.pl-name { flex:1; }
.pl-time { color:#4a7aaa; font-size:10px; }

/* Bottom info bar */
.info-cell { font-size:11px; font-family:Tahoma; }
.info-lbl { color:#92d9ff; }
.info-val { color:#81ff28; font-weight:bold; }

button { cursor:pointer; }
.win-btn { position:absolute; background:transparent; border:none; cursor:pointer; border-radius:3px; -webkit-app-region:no-drag; }
.win-btn:hover { background:rgba(255,255,255,0.1); }
.tb { position:absolute; background:transparent; border:none; cursor:pointer; border-radius:50%; -webkit-app-region:no-drag; }
.tb:hover { background:rgba(129,255,40,0.15); }
.tb:active { background:rgba(129,255,40,0.3); }
</style>
</head>

<div style="position:absolute;top:87%;left:46%;width:22%;display:flex;align-items:center;justify-content:center;gap:6px;pointer-events:none;">
  <span style="color:#81ff28;font-size:11px;font-family:'Courier New';text-shadow:0 0 6px #81ff28;" id="time-display">00:00 / --:--</span>
</div>

<!-- Volume slider -->
<input type="range" id="vol-slider" min="0" max="100" value="80" 
  style="position:absolute;top:91.5%;left:72%;width:16%;accent-color:#81ff28;cursor:pointer;-webkit-app-region:no-drag;"
  oninput="setVol(this.value)"/>

<script>
const CHANNELS = [
  {name:'Cosmic Pulse',channel:'FutureTV',url:'https://90s.myretrotvs.com/#H8oWpfQSr2Q',bitrate:'128 kbps',useWebview:true},
  {name:'Liquid Dreams',channel:'RetroTV',url:'https://www.youtube.com/embed/videoseries?list=PLToa_dCBQFdohFHfMqmMRcwwCLdPlQeRD&autoplay=1',bitrate:'256 kbps',useWebview:false},
  {name:'Neon Horizon',channel:'NeonTV',url:'https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1',bitrate:'192 kbps',useWebview:false},
  {name:'Digital Sunrise',channel:'DigitalTV',url:'https://www.youtube.com/embed/5qap5aO4i9A?autoplay=1',bitrate:'128 kbps',useWebview:false},
  {name:'Astro Drift',channel:'AstroTV',url:'https://www.youtube.com/embed/kgx4WGK0oNU?autoplay=1',bitrate:'256 kbps',useWebview:false},
  {name:'Zero Gravity',channel:'ZeroTV',url:'https://www.youtube.com/embed/DWcJFNfaw9c?autoplay=1',bitrate:'128 kbps',useWebview:false},
  {name:'Virtual Reality',channel:'VR-TV',url:'https://www.youtube.com/embed/bnVUHWCynig?autoplay=1',bitrate:'320 kbps',useWebview:false},
  {name:'Data Stream',channel:'DataTV',url:'https://www.youtube.com/embed/21X5lGlDOfg?autoplay=1',bitrate:'192 kbps',useWebview:false},
  {name:'Cybernetic Soul',channel:'CyberTV',url:'https://www.youtube.com/embed/YPHkjJ2OCWA?autoplay=1',bitrate:'256 kbps',useWebview:false},
  {name:'Endless Vector',channel:'VectorTV',url:'https://www.youtube.com/embed/GGXzlPnKMgA?autoplay=1',bitrate:'128 kbps',useWebview:false},
  {name:'Synapse Wave',channel:'SynapseTV',url:'https://www.youtube.com/embed/UfcAVejslrU?autoplay=1',bitrate:'192 kbps',useWebview:false},
  {name:'Electric Flow',channel:'ElectricTV',url:'https://www.youtube.com/embed/tDexBj46oNI?autoplay=1',bitrate:'256 kbps',useWebview:false},
];

let currentIdx = null;

// Build playlist
const pl = document.getElementById('playlist');
CHANNELS.forEach((c,i) => {
  const row = document.createElement('div');
  row.className = 'pl-item' + (i===0?' active':'');
  row.id = 'pl-'+i;
  row.innerHTML = '<span class=pl-num>'+(i<9?'0':'')+(i+1)+'</span><span class=pl-name>'+c.name+'</span><span class=pl-time>03:45</span>';
  row.ondblclick = () => tuneChannel(i);
  row.onclick = () => { document.querySelectorAll('.pl-item').forEach((r,j)=>r.classList.toggle('active',j===i)); };
  pl.appendChild(row);
});
document.getElementById('playlist-count').textContent = CHANNELS.length + ' Items — 1:03:45';

function tuneChannel(i) {
  const ch = CHANNELS[i]; currentIdx=i;
  document.querySelectorAll('.pl-item').forEach((r,j)=>r.classList.toggle('active',j===i));
  document.getElementById('info-channel').textContent = ch.channel;
  document.getElementById('info-title').textContent = ch.name;
  document.getElementById('info-bitrate').textContent = ch.bitrate;
  
  const isElectron = typeof process!=='undefined' && process.versions && process.versions.electron;
  const wv = document.getElementById('tv-webview');
  const iframe = document.getElementById('tv-iframe');
  const staticCanvas = document.getElementById('tv-static');
  staticCanvas.style.display='none';

  if(isElectron && ch.useWebview) {
    wv.style.display='block'; iframe.style.display='none';
    wv.setAttribute('src', ch.url);
  } else {
    wv.style.display='none'; iframe.style.display='block';
    iframe.src = ch.url;
  }
  startTimeCounter();
}

function playSelected() {
  const active = document.querySelector('.pl-item.active');
  if(active) { const i=parseInt(active.id.split('-')[1]); tuneChannel(i); }
  else tuneChannel(0);
}
function stopTV() {
  const wv=document.getElementById('tv-webview'),iframe=document.getElementById('tv-iframe'),st=document.getElementById('tv-static');
  wv.style.display='none'; iframe.style.display='none'; iframe.src=''; 
  wv.setAttribute('src',''); st.style.display='block'; drawStatic(); currentIdx=null;
}
function skipBack() { tuneChannel(Math.max(0,(currentIdx||0)-1)); }
function skipNext() { tuneChannel(Math.min(CHANNELS.length-1,(currentIdx||0)+1)); }
function pauseTV() { const iframe=document.getElementById('tv-iframe'); iframe.src=iframe.src; }
function setVol(v) {}
function minimize() {}
function toggleMax() {}
function navClick(id) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+id).classList.add('active');
  if(id==='channels') playSelected();
}

// Time counter
let timeStart=null, timeInterval=null;
function startTimeCounter() {
  timeStart=Date.now(); clearInterval(timeInterval);
  timeInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-timeStart)/1000);
    const m=Math.floor(s/60), sec=s%60;
    document.getElementById('time-display').textContent=(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec+' / --:--';
  },1000);
}

// Static canvas
function drawStatic() {
  const c=document.getElementById('tv-static');
  const w=c.offsetWidth||600, h=c.offsetHeight||400;
  c.width=w; c.height=h;
  const ctx=c.getContext('2d');
  (function loop(){
    if(c.style.display==='none')return;
    const img=ctx.createImageData(w,h);
    for(let i=0;i<img.data.length;i+=4){
      const v=Math.random()>0.5?200:30;
      img.data[i]=img.data[i+1]=img.data[i+2]=v; img.data[i+3]=255;
    }
    ctx.putImageData(img,0,0);
    requestAnimationFrame(loop);
  })();
}
drawStatic();

// Auto-tune first channel
setTimeout(()=>tuneChannel(0), 300);
</script>
</body>
</html>
