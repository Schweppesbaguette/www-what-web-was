<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:850px;height:367px;
  background:transparent!important;
  overflow:hidden;
  -webkit-app-region:drag;
  user-select:none;
}
#skin{
  position:absolute;top:0;left:0;
  width:850px;height:367px;
  pointer-events:none;z-index:1;
}
input,button,canvas,select,.nodrag{
  -webkit-app-region:no-drag;
  user-select:text;
}

.skin-btn{
  position:absolute;cursor:pointer;z-index:3;
  -webkit-app-region:no-drag;
  background:transparent;border:none;padding:0;
  border-radius:50%;
  transition:filter 0.1s,transform 0.08s;
  overflow:hidden;
}
.skin-btn:hover{filter:brightness(1.3) drop-shadow(0 0 4px rgba(255,255,255,0.5));transform:scale(1.05);}
.skin-btn:active{filter:brightness(0.8);transform:scale(0.95);}
.skin-btn img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;}

#lcd{
  position:absolute;z-index:2;
  top:100px;left:80px;width:540px;height:160px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
}
#freq-display{
  font-size:48px;font-weight:bold;
  font-family:'Courier New',monospace;
  color:#81ff28;
  text-shadow:0 0 12px #81ff28,0 0 24px rgba(129,255,40,0.4);
  letter-spacing:3px;line-height:1;
}
#station-name{font-size:16px;color:#81ff28;font-family:Tahoma;text-shadow:0 0 8px rgba(129,255,40,0.5);margin-top:6px;}
#station-genre{font-size:11px;color:rgba(129,255,40,0.7);font-family:Tahoma;margin-top:3px;}

#stereo-lbl{position:absolute;z-index:2;top:118px;left:92px;font-size:10px;color:#81ff28;font-family:'Courier New';pointer-events:none;}
#signal-bars{
  position:absolute;z-index:2;
  top:118px;right:235px;
  display:flex;gap:2px;align-items:flex-end;
  pointer-events:none;
}
.sig-bar{width:5px;background:#81ff28;box-shadow:0 0 4px #81ff28;}

#tuner-canvas{
  position:absolute;z-index:2;
  top:215px;left:80px;width:540px;height:50px;
  pointer-events:none;
}

#vol-slider{
  position:absolute;z-index:3;
  /* R3.15 — corrected position via precise pixel trace of radio2.png column.
     The actual painted slider groove is at y=334-340 (7px tall), x=440-703 (~263px).
     Previous R3.14 y=338 had the slider's bottom edge below the groove.
     radio2.png was patched in R3.15 to erase BOTH the painted silver thumb AND
     the baked-in green-fill (50% volume indicator) so our slider paints both. */
  top:334px;left:440px;width:263px;height:7px;
  cursor:pointer;
  -webkit-app-region:no-drag;
  -webkit-appearance:none;
  appearance:none;
  background:transparent;
  outline:none;
  margin:0;padding:0;
  --fill-pct:80%;
  background:linear-gradient(to right,
    rgba(129,255,40,0.9) 0%,
    rgba(129,255,40,0.9) var(--fill-pct),
    transparent var(--fill-pct),
    transparent 100%);
  border-radius:3px;
  box-shadow:inset 0 0 3px rgba(129,255,40,0.4);
}
#vol-slider::-webkit-slider-runnable-track{
  height:7px;background:transparent;border-radius:3px;
}
#vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffffff 0%, #e0e8f0 25%, #8090a8 70%, #4060a0 100%);
  box-shadow:0 0 3px rgba(0,0,0,0.6),inset 0 -1px 2px rgba(0,0,0,0.4);
  cursor:pointer;
  /* Center 13px thumb on 7px track */
  margin-top:-3px;
}

#presets-panel{
  position:absolute;z-index:2;
  top:108px;left:645px;width:185px;height:160px;
  -webkit-app-region:no-drag;
  overflow-y:auto;
}
.preset-row{display:flex;align-items:center;gap:4px;padding:3px 5px;cursor:pointer;font-size:10px;font-family:Tahoma;color:#92d9ff;border-bottom:1px solid rgba(72,136,255,0.1);}
.preset-row:hover{background:rgba(72,136,255,0.15);}
.preset-row.active{color:#81ff28;background:rgba(0,60,0,0.3);}
</style>
</head>
<body>

<img id="skin" src=""/>

<div id="stereo-lbl">STEREO ● RDS</div>
<div id="signal-bars">
  <div class="sig-bar" style="height:5px;"></div>
  <div class="sig-bar" style="height:8px;"></div>
  <div class="sig-bar" style="height:11px;"></div>
  <div class="sig-bar" style="height:14px;"></div>
  <div class="sig-bar" style="height:11px;"></div>
</div>

<div id="lcd">
  <div style="display:flex;align-items:flex-end;gap:6px;">
    <span id="freq-display">88.5</span>
    <span style="font-size:20px;color:#81ff28;font-family:'Courier New';text-shadow:0 0 8px #81ff28;margin-bottom:6px;">FM</span>
  </div>
  <div id="station-name">Chill FM</div>
  <div id="station-genre">Easy Listening</div>
</div>

<canvas id="tuner-canvas"></canvas>

<input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVol(this.value)"/>
<div id="presets-panel"></div>

<!-- Window control buttons — chrome circles at (740,77) (765,77) (791,77), ~20×20 -->
<button class="skin-btn" style="left:730px;top:67px;width:20px;height:22px;" onclick="winMin()" title="Minimize"><img id="btn-min" src=""/></button>
<button class="skin-btn" style="left:755px;top:67px;width:20px;height:22px;" onclick="winMax()" title="Maximize"><img id="btn-max" src=""/></button>
<button class="skin-btn" style="left:781px;top:67px;width:20px;height:22px;" onclick="closeWin()" title="Close"><img id="btn-close" src=""/></button>

<!-- 6 transport buttons — R3.13 sized 40×40 to fully cover the chrome's 35px holes
     (the button-asset face is ~85% of the asset, so 40px renders ~34px visible face).
     Centered on measured hole centers x=147,196,246,293,340,390  y_center=318
     (top = 318 - 20 = 298) -->
<button class="skin-btn" style="left:127px;top:298px;width:40px;height:40px;" onclick="radioSkipPrev()" title="Previous"><img id="btn-rew" src=""/></button>
<button class="skin-btn" style="left:176px;top:298px;width:40px;height:40px;" onclick="radioStop()" title="Stop"><img id="btn-stop" src=""/></button>
<button class="skin-btn" style="left:226px;top:298px;width:40px;height:40px;" onclick="togglePlay()" title="Play"><img id="btn-play" src=""/></button>
<button class="skin-btn" style="left:273px;top:298px;width:40px;height:40px;" onclick="togglePlay()" title="Pause"><img id="btn-pause" src=""/></button>
<button class="skin-btn" style="left:320px;top:298px;width:40px;height:40px;" onclick="scanNext()" title="Scan"><img id="btn-scan" src=""/></button>
<button class="skin-btn" style="left:370px;top:298px;width:40px;height:40px;" onclick="nextPreset()" title="Preset"><img id="btn-preset" src=""/></button>

<script>
async function loadAssets() {
  const files = {
    'skin':'radio2.png',
    'btn-min':'btn-minimize.png',
    'btn-max':'btn-fullscreen.png',
    'btn-close':'btn-close.png',
    'btn-rew':'radio-btn-rew.png',
    'btn-stop':'radio-btn-stop.png',
    'btn-play':'radio-btn-play.png',
    'btn-pause':'radio-btn-pause.png',
    'btn-scan':'radio-btn-scan.png',
    'btn-preset':'radio-btn-preset.png',
  };
  for (const [id, file] of Object.entries(files)) {
    let src;
    if (window.electronAPI && window.electronAPI.readAssetBase64) src = await window.electronAPI.readAssetBase64(file);
    if (!src) src = 'assets/' + file;
    document.getElementById(id).src = src;
  }
}
loadAssets();

const PRESETS=[
  {num:'01',freq:'88.5',name:'Chill FM',genre:'Easy Listening',url:'https://stream.zeno.fm/0r0xa792kwzuv'},
  {num:'02',freq:'91.0',name:'90s Alt',genre:'Grunge / Alternative',url:'https://stream.zeno.fm/yn65dy4vhs8uv'},
  {num:'03',freq:'94.0',name:'Hip Hop',genre:'Hip Hop',url:'https://stream.zeno.fm/f3wvbbqmdg8uv'},
  {num:'04',freq:'97.0',name:'Y2K Pop',genre:'2000s Pop',url:'https://stream.zeno.fm/0r0xa792kwzuv'},
  {num:'05',freq:'101.7',name:'Future FM',genre:'Electronic',url:'https://stream.zeno.fm/yn65dy4vhs8uv'},
  {num:'06',freq:'104.9',name:'Analog Dreams',genre:'Indie',url:'https://stream.zeno.fm/0r0xa792kwzuv'},
];
let audio=null,playing=false,currentPreset=null,tunerPos=0.15;

(function(){
  const list=document.getElementById('presets-panel');
  PRESETS.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='preset-row';row.id='pr-'+i;
    row.innerHTML=`<span style="color:#4a7aaa;width:18px;font-size:9px;">${p.num}</span><span style="width:32px;font-size:10px;">${p.freq}</span><span style="flex:1;">${p.name}</span>`;
    row.onclick=()=>tunePreset(i);
    list.appendChild(row);
  });
})();

function tunePreset(i){
  const p=PRESETS[i];currentPreset=i;
  document.querySelectorAll('.preset-row').forEach((r,j)=>r.classList.toggle('active',j===i));
  document.getElementById('freq-display').textContent=p.freq;
  document.getElementById('station-name').textContent=p.name;
  document.getElementById('station-genre').textContent=p.genre;
  tunerPos=i/(PRESETS.length-1)*0.85+0.05; drawTuner();
  if(audio){audio.pause();audio.src='';}
  audio=new Audio(p.url); audio.crossOrigin='anonymous';
  audio.volume=document.getElementById('vol-slider').value/100;
  audio.play().then(()=>{playing=true;animateBars();}).catch(e=>console.log('Stream:',e));
}
function togglePlay(){if(!audio&&PRESETS.length){tunePreset(0);return;}if(playing){audio.pause();playing=false;}else{audio.play().then(()=>{playing=true;animateBars();}).catch(()=>{});}}
function radioStop(){if(audio){audio.pause();audio.currentTime=0;playing=false;}}
function radioSkipPrev(){tunePreset(Math.max(0,(currentPreset||0)-1));}
function scanNext(){tunePreset(((currentPreset||0)+1)%PRESETS.length);}
function nextPreset(){tunePreset(((currentPreset||0)+1)%PRESETS.length);}
function setVol(v){
  if(audio)audio.volume=v/100;
  // R3.13 — keep the green-fill gradient in sync with the thumb position
  const sl=document.getElementById('vol-slider');
  if(sl) sl.style.setProperty('--fill-pct', v+'%');
}
function winMin(){if(window.electronAPI&&window.electronAPI.minimizeRadio)window.electronAPI.minimizeRadio();}
function winMax(){}
function closeWin(){if(window.electronAPI&&window.electronAPI.closeRadio)window.electronAPI.closeRadio();else window.close();}
function animateBars(){if(!playing)return;document.querySelectorAll('.sig-bar').forEach(b=>{b.style.height=(4+Math.random()*12)+'px';});setTimeout(animateBars,200);}

function drawTuner(){
  const c=document.getElementById('tuner-canvas');
  const w=540,h=50;
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const freqs=[88,90,92,94,96,98,100,102,104,106,108];
  ctx.fillStyle='#81ff28';ctx.font='9px Courier New';ctx.textAlign='center';
  freqs.forEach((f,i)=>{
    const x=(i/(freqs.length-1))*w;
    ctx.fillText(f,x,11); ctx.fillRect(x-0.5,15,1,7);
    if(i<freqs.length-1){for(let m=1;m<5;m++){const mx=x+(m/5)*(w/(freqs.length-1));ctx.fillRect(mx-0.5,18,1,4);}}
  });
  const nx=tunerPos*w;
  ctx.strokeStyle='#81ff28';ctx.lineWidth=2;ctx.shadowColor='#81ff28';ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(nx,15);ctx.lineTo(nx,h);ctx.stroke();ctx.shadowBlur=0;
}
drawTuner();
setTimeout(()=>tunePreset(0),400);
// R3.13 — initialize volume fill gradient
setVol(document.getElementById('vol-slider').value);
</script>
</body>
</html>
