<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:910px;height:394px;
  background:transparent!important;
  overflow:hidden;
  -webkit-app-region:drag;
  user-select:none;
}
#skin{position:absolute;top:0;left:0;width:910px;height:394px;pointer-events:none;}
input,button,canvas,select,.nodrag{-webkit-app-region:no-drag;user-select:text;}

.skin-btn{
  position:absolute;cursor:pointer;
  -webkit-app-region:no-drag;
  background:transparent;border:none;padding:0;
  transition:filter 0.1s,transform 0.08s;
}
.skin-btn:hover{filter:brightness(1.25);transform:scale(1.08);}
.skin-btn:active{filter:brightness(0.8);transform:scale(0.95);}
.skin-btn img{width:100%;height:100%;object-fit:contain;}

/* LCD display area overlaid on the black screen */
#lcd{
  position:absolute;
  top:27%;left:7%;width:63%;height:45%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
}
#freq-display{
  font-size:42px;font-weight:bold;
  font-family:'Courier New',monospace;
  color:#81ff28;
  text-shadow:0 0 10px #81ff28,0 0 20px rgba(129,255,40,0.3);
  letter-spacing:2px;line-height:1;
}
#station-name{
  font-size:13px;color:#81ff28;
  font-family:Tahoma,Arial;
  text-shadow:0 0 8px rgba(129,255,40,0.5);
  margin-top:4px;
}
#station-genre{
  font-size:10px;color:rgba(129,255,40,0.7);
  font-family:Tahoma;margin-top:2px;
}
#stereo-lbl{position:absolute;top:29%;left:8%;font-size:9px;color:#81ff28;font-family:'Courier New';pointer-events:none;}
#rds-lbl{position:absolute;top:34%;left:8%;font-size:9px;color:#81ff28;font-family:'Courier New';pointer-events:none;}
#signal-lbl{position:absolute;top:29%;right:30%;font-size:9px;color:#81ff28;font-family:'Courier New';pointer-events:none;}
#signal-bars{
  position:absolute;top:33%;right:29%;
  display:flex;gap:2px;align-items:flex-end;
  pointer-events:none;
}
.sig-bar{width:5px;background:#81ff28;box-shadow:0 0 4px #81ff28;}

/* Tuner canvas */
#tuner-canvas{position:absolute;top:64%;left:7%;width:63%;height:14%;pointer-events:none;}

/* Status bar overlay */
#status-bar{
  position:absolute;top:80%;left:47%;width:32%;
  display:flex;align-items:center;justify-content:center;gap:6px;
  pointer-events:none;
  font-size:11px;font-family:'Courier New';color:#81ff28;
  text-shadow:0 0 6px #81ff28;
}

/* Volume slider */
#vol-slider{
  position:absolute;top:84%;left:47%;width:28%;
  accent-color:#81ff28;cursor:pointer;
  -webkit-app-region:no-drag;
}

/* Presets panel */
#presets-panel{
  position:absolute;top:27%;left:72%;width:25%;height:50%;
  -webkit-app-region:no-drag;
  overflow-y:auto;
}
.preset-row{
  display:flex;align-items:center;gap:4px;
  padding:3px 6px;cursor:pointer;
  font-size:10px;font-family:Tahoma;color:#92d9ff;
  border-bottom:1px solid rgba(72,136,255,0.1);
}
.preset-row:hover{background:rgba(72,136,255,0.15);}
.preset-row.active{color:#81ff28;background:rgba(0,60,0,0.3);}
</style>
</head>
<body>

<img id="skin" src="assets/radio2.png" alt=""/>

<!-- LCD display labels -->
<div id="stereo-lbl">STEREO</div>
<div id="rds-lbl">⟳ RDS</div>
<div id="signal-lbl">SIGNAL</div>
<div id="signal-bars">
  <div class="sig-bar" style="height:5px;"></div>
  <div class="sig-bar" style="height:8px;"></div>
  <div class="sig-bar" style="height:11px;"></div>
  <div class="sig-bar" style="height:14px;"></div>
  <div class="sig-bar" style="height:11px;"></div>
</div>

<!-- LCD screen content -->
<div id="lcd">
  <div style="display:flex;align-items:flex-end;gap:4px;">
    <span id="freq-display">88.5</span>
    <span style="font-size:18px;color:#81ff28;font-family:'Courier New';text-shadow:0 0 8px #81ff28;margin-bottom:4px;">FM</span>
  </div>
  <div id="station-name">Chill FM</div>
  <div id="station-genre">Easy Listening</div>
</div>

<!-- Tuner bar -->
<canvas id="tuner-canvas"></canvas>

<!-- Status bar -->
<div id="status-bar">
  <span id="status-freq">88.5 FM</span>
  <span>STEREO</span>
  <span>📡</span>
</div>

<!-- Volume slider -->
<input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVol(this.value)"/>

<!-- Presets panel -->
<div id="presets-panel"></div>

<!-- Window controls (top-right 3 circles: 87%,90%,93% width, 18% height) -->
<button class="skin-btn" style="top:12%;left:83%;width:4%;height:12%;" onclick="minimize()"><img src="assets/btn-minimize.png"/></button>
<button class="skin-btn" style="top:12%;left:87%;width:4%;height:12%;" onclick="toggleMax()"><img src="assets/btn-fullscreen.png"/></button>
<button class="skin-btn" style="top:12%;left:91%;width:4%;height:12%;" onclick="closeWin()"><img src="assets/btn-close.png"/></button>

<!-- Transport buttons from sliced radiobuttons strip -->
<!-- 5 circles at ~17%,23%,29%,34%,40% width, 82% height -->
<button class="skin-btn" style="top:76%;left:14%;width:5%;height:13%;" onclick="radioSkipPrev()"><img src="assets/radio-btn-rew.png"/></button>
<button class="skin-btn" style="top:76%;left:20%;width:5%;height:13%;" onclick="radioStop()"><img src="assets/radio-btn-stop.png"/></button>
<button class="skin-btn" style="top:76%;left:26%;width:5%;height:13%;" onclick="togglePlay()"><img src="assets/radio-btn-play.png"/></button>
<button class="skin-btn" style="top:76%;left:32%;width:5%;height:13%;" onclick="togglePlay()"><img src="assets/radio-btn-pause.png"/></button>
<button class="skin-btn" style="top:76%;left:38%;width:5%;height:13%;" onclick="scanNext()"><img src="assets/radio-btn-scan.png"/></button>
<button class="skin-btn" style="top:76%;left:44%;width:5%;height:13%;" onclick="nextPreset()"><img src="assets/radio-btn-preset.png"/></button>

<script>
const PRESETS=[
  {num:'01',freq:'88.5',name:'Chill FM',genre:'Easy Listening',url:'https://stream.zeno.fm/0r0xa792kwzuv'},
  {num:'02',freq:'91.0',name:'90s Alt',genre:'Grunge / Alternative',url:'https://stream.zeno.fm/yn65dy4vhs8uv'},
  {num:'03',freq:'94.0',name:'Hip Hop',genre:'Hip Hop',url:'https://stream.zeno.fm/f3wvbbqmdg8uv'},
  {num:'04',freq:'97.0',name:'Y2K Pop',genre:'2000s Pop',url:'https://stream.zeno.fm/0r0xa792kwzuv'},
  {num:'05',freq:'101.7',name:'Future FM',genre:'Electronic',url:'https://stream.zeno.fm/yn65dy4vhs8uv'},
  {num:'06',freq:'104.9',name:'Analog Dreams',genre:'Indie',url:'https://stream.zeno.fm/0r0xa792kwzuv'},
];

let audio=null, playing=false, currentPreset=null, tunerPos=0.15;

// Build presets
(function(){
  const list=document.getElementById('presets-panel');
  PRESETS.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='preset-row';row.id='pr-'+i;
    row.innerHTML=`<span style="color:#4a7aaa;width:16px;font-size:9px;">${p.num}</span><span style="width:32px;font-size:9px;">${p.freq}</span><span style="flex:1;">${p.name}</span>`;
    row.onclick=()=>tunePreset(i);
    list.appendChild(row);
  });
})();

function tunePreset(i){
  const p=PRESETS[i]; currentPreset=i;
  document.querySelectorAll('.preset-row').forEach((r,j)=>r.classList.toggle('active',j===i));
  document.getElementById('freq-display').textContent=p.freq;
  document.getElementById('station-name').textContent=p.name;
  document.getElementById('station-genre').textContent=p.genre;
  document.getElementById('status-freq').textContent=p.freq+' FM';
  tunerPos=i/(PRESETS.length-1)*0.85+0.05;
  drawTuner();
  if(audio){audio.pause();audio.src='';}
  audio=new Audio(p.url);
  audio.crossOrigin='anonymous';
  audio.volume=document.getElementById('vol-slider').value/100;
  audio.play().then(()=>{playing=true;animateBars();}).catch(e=>console.log('Stream error:',e));
}

function togglePlay(){
  if(!audio&&PRESETS.length){tunePreset(0);return;}
  if(playing){audio.pause();playing=false;}
  else{audio.play().then(()=>{playing=true;animateBars();}).catch(()=>{});}
}
function radioStop(){if(audio){audio.pause();audio.currentTime=0;playing=false;}}
function radioSkipPrev(){tunePreset(Math.max(0,(currentPreset||0)-1));}
function scanNext(){tunePreset(((currentPreset||0)+1)%PRESETS.length);}
function nextPreset(){tunePreset(((currentPreset||0)+1)%PRESETS.length);}
function setVol(v){if(audio)audio.volume=v/100;}
function minimize(){if(window.electronAPI)window.electronAPI.minimizeRadio();}
function toggleMax(){}
function closeWin(){if(window.electronAPI)window.electronAPI.closeRadio();else window.close();}

function animateBars(){
  if(!playing)return;
  document.querySelectorAll('.sig-bar').forEach(b=>{b.style.height=(4+Math.random()*12)+'px';});
  setTimeout(animateBars,200);
}

// Tuner canvas
function drawTuner(){
  const c=document.getElementById('tuner-canvas');
  const w=c.offsetWidth||580,h=c.offsetHeight||55;
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const freqs=[88,90,92,94,96,98,100,102,104,106,108];
  ctx.fillStyle='#81ff28';ctx.font='9px Courier New';ctx.textAlign='center';
  freqs.forEach((f,i)=>{
    const x=(i/(freqs.length-1))*w;
    ctx.fillText(f,x,12);
    ctx.fillRect(x-0.5,16,1,7);
    if(i<freqs.length-1){
      for(let m=1;m<5;m++){const mx=x+(m/5)*(w/(freqs.length-1));ctx.fillRect(mx-0.5,19,1,4);}
    }
  });
  ctx.fillText('FM',w-8,12);
  // Needle
  const nx=tunerPos*w;
  ctx.strokeStyle='#81ff28';ctx.lineWidth=2;ctx.shadowColor='#81ff28';ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(nx,16);ctx.lineTo(nx,h);ctx.stroke();
  ctx.shadowBlur=0;
}
drawTuner();
window.addEventListener('resize',drawTuner);

// Auto-tune first preset
setTimeout(()=>tunePreset(0),400);
</script>
</body>
</html>
