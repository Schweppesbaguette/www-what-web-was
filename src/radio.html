<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:1100px; height:540px;
  background:transparent !important;
  overflow:hidden;
  -webkit-app-region:drag;
  user-select:none;
  margin:0;
  padding:0;
}
#skin { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none; }
input,button,select,canvas,.nodrag { -webkit-app-region:no-drag; user-select:text; }
button { cursor:pointer; }

/* Green LCD display font */
@font-face { font-family:'LCD'; src:local('Courier New'); }

/* Main frequency display overlay */
#freq-display {
  position:absolute;
  top:27%; left:17%; width:57%; height:43%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none;
}
#freq-num {
  font-size:52px; font-weight:bold; font-family:'Courier New',monospace;
  color:#81ff28; text-shadow:0 0 12px #81ff28, 0 0 24px rgba(129,255,40,0.4);
  letter-spacing:2px; line-height:1;
}
#freq-unit {
  font-size:22px; color:#81ff28; font-family:'Courier New',monospace;
  text-shadow:0 0 8px #81ff28; margin-left:6px;
}
#station-name {
  font-size:15px; color:#81ff28; font-family:Tahoma,Arial,sans-serif;
  text-shadow:0 0 8px rgba(129,255,40,0.6); margin-top:4px; text-align:center;
}
#station-genre {
  font-size:11px; color:rgba(129,255,40,0.7); font-family:Tahoma;
  text-align:center; margin-top:2px;
}
#stereo-label {
  position:absolute; top:30%; left:18%; font-size:10px; color:#81ff28;
  font-family:'Courier New'; text-shadow:0 0 6px #81ff28; pointer-events:none;
}
#rds-label {
  position:absolute; top:35%; left:18%; font-size:10px; color:#81ff28;
  font-family:'Courier New'; text-shadow:0 0 6px #81ff28; pointer-events:none;
}
#signal-label {
  position:absolute; top:30%; right:22%; font-size:10px; color:#81ff28;
  font-family:'Courier New'; text-shadow:0 0 6px #81ff28; pointer-events:none;
}
/* Signal bars */
#signal-bars {
  position:absolute; top:34%; right:21%;
  display:flex; gap:2px; align-items:flex-end;
  pointer-events:none;
}
.sig-bar { width:5px; background:#81ff28; box-shadow:0 0 4px #81ff28; }

/* FM tuner bar canvas */
#tuner-canvas {
  position:absolute; top:64%; left:17%; width:57%; height:12%;
  pointer-events:none;
}

/* Status bar (bottom pill) */
#status-bar {
  position:absolute; top:80%; left:52%; width:30%;
  display:flex; align-items:center; justify-content:center; gap:8px;
  pointer-events:none;
}
#status-freq { font-size:12px; color:#81ff28; font-family:'Courier New'; text-shadow:0 0 6px #81ff28; }
#status-stereo { font-size:12px; color:#81ff28; font-family:'Courier New'; text-shadow:0 0 6px #81ff28; }

/* Transport buttons (invisible overlays on the chrome buttons) */
.tb { position:absolute; background:transparent; border:none; width:4%; height:8%; cursor:pointer; border-radius:50%; }
.tb:hover { background:rgba(129,255,40,0.15); }
.tb:active { background:rgba(129,255,40,0.3); }

/* Presets panel */
#presets-panel {
  position:absolute; top:26%; left:75%; width:22%; height:55%;
  display:flex; flex-direction:column; overflow:hidden;
}
#presets-title {
  font-size:11px; color:#92d9ff; font-family:Tahoma; font-weight:bold;
  padding:2px 6px; pointer-events:none;
}
.preset-row {
  display:flex; align-items:center; gap:4px; padding:3px 5px;
  cursor:pointer; font-size:10px; font-family:Tahoma; color:#92d9ff;
  transition:all 0.1s; border-radius:2px;
  -webkit-app-region:no-drag;
}
.preset-row:hover { background:rgba(72,136,255,0.2); }
.preset-row.active { background:#1a5a1a; color:#81ff28; }
.preset-num { width:16px; color:#4a7aaa; flex-shrink:0; }
.preset-freq { width:32px; flex-shrink:0; }
.preset-name { flex:1; }

/* Volume slider */
#vol-slider {
  position:absolute; top:82%; left:52%; width:22%;
  -webkit-app-region:no-drag;
  accent-color:#81ff28; cursor:pointer;
}

/* Now playing bar */
#now-bar {
  position:absolute; top:14%; left:17%; width:57%;
  display:flex; align-items:center; gap:8px;
  pointer-events:none;
}
#now-play-icon { font-size:12px; color:#81ff28; text-shadow:0 0 6px #81ff28; }
#now-play-text { font-size:11px; color:white; font-family:Tahoma; }

/* Close/min/max buttons */
.win-btn { position:absolute; background:transparent; border:none; width:24px; height:24px; cursor:pointer; border-radius:3px; -webkit-app-region:no-drag; }
.win-btn:hover { background:rgba(255,255,255,0.1); }
</style>
</head>
<body>

<img id="skin" src="assets/radio.png" alt="" style="position:absolute;top:0;left:0;width:1100px;height:540px;pointer-events:none;"/>

<!-- Window controls (top-right of skin) -->
<button class="win-btn" style="top:27%;right:17.5%;" onclick="if(window.electronAPI)window.electronAPI.closeRadio();else window.close()" title="Close"></button>
<button class="win-btn" style="top:27%;right:20.5%;" onclick="toggleMax()" title="Maximize"></button>
<button class="win-btn" style="top:27%;right:23%;" onclick="minimize()" title="Minimize"></button>

<!-- Now playing bar -->
<div id="now-bar">
  <span id="now-play-icon">▶</span>
  <span id="now-play-text">Now Playing</span>
  <div style="display:flex;gap:2px;align-items:flex-end;margin-left:8px;">
    <div style="width:3px;height:6px;background:#81ff28;"></div>
    <div style="width:3px;height:9px;background:#81ff28;"></div>
    <div style="width:3px;height:12px;background:#81ff28;"></div>
    <div style="width:3px;height:9px;background:#81ff28;"></div>
    <div style="width:3px;height:7px;background:#81ff28;"></div>
  </div>
</div>

<!-- LCD Display -->
<div id="stereo-label">STEREO</div>
<div id="rds-label">⟳ RDS</div>
<div id="signal-label">SIGNAL</div>
<div id="signal-bars">
  <div class="sig-bar" style="height:5px;"></div>
  <div class="sig-bar" style="height:8px;"></div>
  <div class="sig-bar" style="height:11px;"></div>
  <div class="sig-bar" style="height:14px;"></div>
  <div class="sig-bar" style="height:11px;"></div>
</div>

<div id="freq-display">
  <div style="display:flex;align-items:flex-end;gap:6px;">
    <span id="freq-num">88.0</span>
    <span id="freq-unit">FM</span>
  </div>
  <div id="station-name">Select a station</div>
  <div id="station-genre">Use presets or scan</div>
</div>

<!-- Tuner bar canvas -->
<canvas id="tuner-canvas"></canvas>

<!-- Transport buttons overlaid on chrome buttons -->
<button class="tb" style="top:78%;left:20.5%;" onclick="radioSkipPrev()" title="Previous"></button>
<button class="tb" style="top:78%;left:25%;" onclick="radioStop()" title="Stop"></button>
<button class="tb" style="top:78%;left:29.5%;" id="play-btn" onclick="togglePlay()" title="Play/Pause"></button>
<button class="tb" style="top:78%;left:34%;" onclick="togglePlay()" title="Pause"></button>
<button class="tb" style="top:78%;left:40%;" onclick="scanNext()" title="Scan"></button>
<button class="tb" style="top:78%;left:45%;" onclick="nextPreset()" title="Preset"></button>

<!-- Status bar -->
<div id="status-bar">
  <span id="status-freq">88.0 FM</span>
  <span id="status-stereo">STEREO</span>
  <span style="font-size:12px;color:#81ff28;">📡</span>
</div>

<!-- Volume -->
<input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVol(this.value)"/>

<!-- Presets panel -->
<div id="presets-panel">
  <div id="presets-title">PRESETS ▼</div>
  <div id="presets-list"></div>
  <div style="display:flex;gap:4px;padding:2px 4px;margin-top:2px;">
    <button onclick="presetUp()" style="flex:1;background:#1a3a6a;border:1px solid #4878c8;color:#92d9ff;font-size:14px;cursor:pointer;border-radius:3px;padding:2px;-webkit-app-region:no-drag;">▲</button>
    <button onclick="presetDown()" style="flex:1;background:#1a3a6a;border:1px solid #4878c8;color:#92d9ff;font-size:14px;cursor:pointer;border-radius:3px;padding:2px;-webkit-app-region:no-drag;">▼</button>
  </div>
</div>

<script>
const PRESETS = [
  {num:'01',freq:'88.5',name:'Chill FM',url:'https://stream.zeno.fm/0r0xa792kwzuv',genre:'Easy Listening'},
  {num:'02',freq:'91',name:'90s Alt',url:'https://stream.zeno.fm/yn65dy4vhs8uv',genre:'Grunge / Alternative'},
  {num:'03',freq:'94',name:'Hip Hop',url:'https://stream.zeno.fm/f3wvbbqmdg8uv',genre:'Hip Hop'},
  {num:'04',freq:'97',name:'Y2K Pop',url:'https://stream.zeno.fm/0r0xa792kwzuv',genre:'2000s Pop'},
  {num:'05',freq:'101.7',name:'Future FM',url:'https://stream.zeno.fm/yn65dy4vhs8uv',genre:'Electronic'},
  {num:'06',freq:'104.9',name:'Analog Dreams',url:'https://stream.zeno.fm/0r0xa792kwzuv',genre:'Indie'},
];

let currentAudio = null;
let playing = false;
let currentPreset = null;
let tunerPos = 0.15; // 0-1 position on FM dial

// Build presets
const list = document.getElementById('presets-list');
PRESETS.forEach((p,i) => {
  const row = document.createElement('div');
  row.className = 'preset-row';
  row.id = 'preset-'+i;
  row.innerHTML = '<span class=preset-num>'+p.num+'</span><span class=preset-freq>'+p.freq+'</span><span class=preset-name>'+p.name+'</span>';
  row.onclick = () => tunePreset(i);
  list.appendChild(row);
});

function tunePreset(i) {
  const p = PRESETS[i];
  currentPreset = i;
  document.querySelectorAll('.preset-row').forEach((r,j) => r.classList.toggle('active', j===i));
  document.getElementById('freq-num').textContent = p.freq;
  document.getElementById('station-name').textContent = p.name;
  document.getElementById('station-genre').textContent = p.genre;
  document.getElementById('status-freq').textContent = p.freq + ' FM';
  document.getElementById('now-play-text').textContent = p.name + ' — ' + p.genre;
  tunerPos = i / (PRESETS.length - 1);
  drawTuner();
  if(currentAudio){ currentAudio.pause(); currentAudio.src=''; }
  currentAudio = new Audio(p.url);
  currentAudio.crossOrigin = 'anonymous';
  currentAudio.volume = document.getElementById('vol-slider').value / 100;
  currentAudio.play().then(() => { playing = true; animateBars(); }).catch(()=>{});
}

function togglePlay() {
  if(!currentAudio && PRESETS.length) { tunePreset(0); return; }
  if(playing) { currentAudio.pause(); playing=false; }
  else { currentAudio.play().then(()=>{ playing=true; animateBars(); }).catch(()=>{}); }
}
function radioStop() { if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;playing=false;} }
function radioSkipPrev() { tunePreset(Math.max(0,(currentPreset||0)-1)); }
function scanNext() { tunePreset(((currentPreset||0)+1) % PRESETS.length); }
function nextPreset() { tunePreset(((currentPreset||0)+1) % PRESETS.length); }
function presetUp() { tunePreset(Math.max(0,(currentPreset||0)-1)); }
function presetDown() { tunePreset(Math.min(PRESETS.length-1,(currentPreset||0)+1)); }
function setVol(v) { if(currentAudio) currentAudio.volume=v/100; }
function minimize(){if(window.electronAPI)window.electronAPI.minimizeRadio();}
function toggleMax() {}

// Signal bar animation
function animateBars() {
  if(!playing) return;
  const bars = document.querySelectorAll('.sig-bar');
  bars.forEach(b => { b.style.height = (5+Math.random()*12)+'px'; });
  setTimeout(animateBars, 200);
}

// Tuner canvas
function drawTuner() {
  const c = document.getElementById('tuner-canvas');
  const w = c.offsetWidth || 600; const h = c.offsetHeight || 55;
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  // Background
  ctx.fillStyle='rgba(0,0,0,0.0)'; ctx.fillRect(0,0,w,h);
  // Frequency marks
  const freqs = [88,90,92,94,96,98,100,102,104,106,108];
  ctx.fillStyle='#81ff28'; ctx.font='10px Courier New'; ctx.textAlign='center';
  freqs.forEach((f,i) => {
    const x = (i/(freqs.length-1))*w;
    ctx.fillText(f, x, 14);
    // tick marks
    ctx.fillRect(x-0.5, 18, 1, 8);
    // minor ticks
    if(i<freqs.length-1) for(let m=1;m<5;m++) {
      const mx=x+(m/5)*(w/(freqs.length-1));
      ctx.fillRect(mx-0.5,22,1,4);
    }
  });
  ctx.fillText('FM',w-10,14);
  // Needle
  const nx = tunerPos * w;
  ctx.strokeStyle='#81ff28'; ctx.lineWidth=2; ctx.shadowColor='#81ff28'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(nx,18); ctx.lineTo(nx,h); ctx.stroke();
  ctx.shadowBlur=0;
}
drawTuner();
window.addEventListener('resize', drawTuner);

// Auto-select first preset
setTimeout(()=>tunePreset(0), 500);
</script>
</body>
</html>
